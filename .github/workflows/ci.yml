name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov behave

      - run: pytest --cov=app --cov-fail-under=75
